<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureLogix | Warehouse Monitoring</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚨</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #060c14;
      --surface:    #0d1b2a;
      --border:     #1a3a5c;
      --accent:     #00d4ff;
      --accent2:    #0077aa;
      --text:       #c8e6f5;
      --muted:      #4a7a9b;
      --danger:     #ff2f2f;
      --warn:       #ffcc00;
      --safe:       #00e676;
      --glow-c:     0 0 12px #00d4ff88, 0 0 40px #00d4ff22;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Grid lines background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Radial glow top-center ── */
    body::after {
      content: '';
      position: fixed;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(0,120,200,.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 24px 60px;
    }

    /* ══ HEADER ══ */
    header {
      text-align: center;
      margin-bottom: 42px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 48px; height: 48px;
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.3rem, 3.5vw, 2.1rem);
      font-weight: 900;
      letter-spacing: .12em;
      color: #fff;
      text-shadow: var(--glow-c);
      text-transform: uppercase;
    }

    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: .78rem;
      letter-spacing: .25em;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* connection badge */
    .conn-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
      padding: 5px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      letter-spacing: .1em;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      transition: border-color .4s, color .4s;
    }
    .conn-badge.connected { border-color: var(--safe); color: var(--safe); }
    .conn-badge.error     { border-color: var(--danger); color: var(--danger); }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .4s;
      flex-shrink: 0;
    }
    .conn-badge.connected .dot { background: var(--safe); animation: pulse-dot 1.8s infinite; }
    .conn-badge.error .dot     { background: var(--danger); }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.7); }
    }

    /* ══ CARDS ROW ══ */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color .35s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .5;
    }

    /* corner brackets */
    .card::after {
      content: '';
      position: absolute;
      bottom: 10px; right: 10px;
      width: 20px; height: 20px;
      border-right: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
      border-radius: 0 0 4px 0;
    }

    .card-icon {
      font-size: 1.4rem;
      margin-bottom: 10px;
      display: block;
      opacity: .85;
    }

    .card-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-value {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--accent);
      text-shadow: var(--glow-c);
      line-height: 1;
      transition: color .4s, text-shadow .4s;
      letter-spacing: -.01em;
    }

    .card-unit {
      font-family: 'Share Tech Mono', monospace;
      font-size: .8rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* per-card accent lines */
    .card-temp::before  { background: linear-gradient(90deg, transparent, #ff6b35, transparent); }
    .card-smoke::before { background: linear-gradient(90deg, transparent, #c060ff, transparent); }
    .card-score::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }

    .card-temp  .card-value { color: #ff8c55; text-shadow: 0 0 14px #ff6b3588, 0 0 40px #ff6b3522; }
    .card-smoke .card-value { color: #c880ff; text-shadow: 0 0 14px #c060ff88, 0 0 40px #c060ff22; }

    /* "data incoming" scan effect */
    .card.updating::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0,212,255,.06) 100%);
      animation: scan .6s ease-out forwards;
    }

    @keyframes scan {
      from { opacity: 0; transform: translateY(-100%); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══ STATUS BANNER ══ */
    .status-banner {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 36px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background .5s, border-color .5s;
    }

    .status-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: inherit;
      filter: blur(0);
      transition: opacity .4s;
    }

    .status-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      letter-spacing: .3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      position: relative; z-index: 1;
    }

    .status-text {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 7vw, 4.5rem);
      font-weight: 900;
      letter-spacing: .15em;
      color: #fff;
      text-shadow: 0 2px 30px rgba(255,255,255,.15);
      position: relative; z-index: 1;
      transition: color .4s, text-shadow .4s;
    }

    /* ── Status States ── */
    .status-banner.aman {
      background: linear-gradient(135deg, #001a0a 0%, #002a10 100%);
      border-color: var(--safe);
      box-shadow: inset 0 0 60px rgba(0,230,118,.08), 0 0 30px rgba(0,230,118,.1);
    }
    .status-banner.aman .status-text { color: var(--safe); text-shadow: 0 0 20px rgba(0,230,118,.6); }

    .status-banner.waspada {
      background: linear-gradient(135deg, #1a1500 0%, #2a2000 100%);
      border-color: var(--warn);
      box-shadow: inset 0 0 60px rgba(255,204,0,.08), 0 0 30px rgba(255,204,0,.1);
    }
    .status-banner.waspada .status-text { color: var(--warn); text-shadow: 0 0 20px rgba(255,204,0,.6); }

    .status-banner.bahaya {
      background: linear-gradient(135deg, #1a0000 0%, #2a0000 100%);
      border-color: var(--danger);
      box-shadow: inset 0 0 60px rgba(255,47,47,.12), 0 0 40px rgba(255,47,47,.2);
      animation: blink-bg 1s ease-in-out infinite;
    }
    .status-banner.bahaya .status-text { color: var(--danger); text-shadow: 0 0 24px rgba(255,47,47,.9); animation: blink-text 1s ease-in-out infinite; }

    @keyframes blink-bg {
      0%,100% { box-shadow: inset 0 0 60px rgba(255,47,47,.12), 0 0 40px rgba(255,47,47,.2); }
      50%      { box-shadow: inset 0 0 100px rgba(255,47,47,.3), 0 0 80px rgba(255,47,47,.4); }
    }
    @keyframes blink-text {
      0%,100% { opacity: 1; }
      50%      { opacity: .5; }
    }

    /* alert icon row */
    .status-icons {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
      position: relative; z-index: 1;
    }

    /* ══ FOOTER / LOG ══ */
    .log-panel {
      margin-top: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      max-height: 140px;
      overflow-y: auto;
    }

    .log-panel::-webkit-scrollbar { width: 4px; }
    .log-panel::-webkit-scrollbar-track { background: transparent; }
    .log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      letter-spacing: .25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .log-entry {
      font-family: 'Share Tech Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,.03);
      display: flex;
      gap: 10px;
    }
    .log-entry .ts { color: var(--accent2); flex-shrink: 0; }
    .log-entry.ok  { color: #7abfcc; }
    .log-entry.err { color: #ff6b6b; }

    /* ══ MISC ══ */
    .timestamp-row {
      text-align: right;
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: .08em;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo-row">
      <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="24,4 44,14 44,34 24,44 4,34 4,14" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity=".4"/>
        <polygon points="24,9 39,17 39,31 24,39 9,31 9,17" fill="none" stroke="#00d4ff" stroke-width="1" opacity=".25"/>
        <path d="M24 16 L24 24 L30 28" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="24" cy="24" r="3" fill="#00d4ff" opacity=".9"/>
        <circle cx="24" cy="16" r="2" fill="#00d4ff" opacity=".7"/>
        <circle cx="30" cy="28" r="2" fill="#00d4ff" opacity=".7"/>
      </svg>
      <h1>SecureLogix</h1>
    </div>
    <div class="subtitle">Warehouse Monitoring System &mdash; Real-Time MQTT</div>
    <div>
      <span class="conn-badge" id="connBadge">
        <span class="dot" id="connDot"></span>
        <span id="connLabel">CONNECTING…</span>
      </span>
    </div>
  </header>

  <!-- ══ SENSOR CARDS ══ -->
  <div class="cards">

    <div class="card card-temp" id="cardTemp">
      <span class="card-icon">🌡️</span>
      <div class="card-label">Suhu</div>
      <div class="card-value" id="valTemp">—</div>
      <div class="card-unit">°C &nbsp;·&nbsp; TEMPERATURE</div>
    </div>

    <div class="card card-smoke" id="cardSmoke">
      <span class="card-icon">💨</span>
      <div class="card-label">Asap</div>
      <div class="card-value" id="valSmoke">—</div>
      <div class="card-unit">% &nbsp;·&nbsp; SMOKE LEVEL</div>
    </div>

    <div class="card card-score" id="cardScore">
      <span class="card-icon">⚡</span>
      <div class="card-label">Skor Risiko</div>
      <div class="card-value" id="valScore">—</div>
      <div class="card-unit">pts &nbsp;·&nbsp; RISK SCORE</div>
    </div>

  </div>

  <!-- ══ STATUS BANNER ══ -->
  <div class="status-banner" id="statusBanner">
    <div class="status-label">▸ System Status</div>
    <div class="status-text" id="statusText">MENUNGGU DATA…</div>
    <div class="status-icons" id="statusIcons"></div>
  </div>

  <!-- ══ TIMESTAMP ══ -->
  <div class="timestamp-row" id="tsRow">Last update: —</div>

  <!-- ══ LOG PANEL ══ -->
  <div class="log-panel">
    <div class="log-title">▸ Activity Log</div>
    <div id="logContainer"></div>
  </div>

</div>

<!-- ══════════════ SCRIPT ══════════════ -->
<script>
(function () {

  /* ── Config ── */
  const BROKER   = 'broker.emqx.io';
  const PORT     = 8084; // Port WSS (Aman) milik EMQX
  const CLIENT_ID = 'securelogix_dash_' + Math.random().toString(16).slice(2, 8);
  const TOPICS   = [
    'arduthon/securelogix/temp',
    'arduthon/securelogix/smoke',
    'arduthon/securelogix/score',
    'arduthon/securelogix/status',
  ];

  /* ── DOM refs ── */
  const connBadge   = document.getElementById('connBadge');
  const connLabel   = document.getElementById('connLabel');
  const valTemp     = document.getElementById('valTemp');
  const valSmoke    = document.getElementById('valSmoke');
  const valScore    = document.getElementById('valScore');
  const statusBanner= document.getElementById('statusBanner');
  const statusText  = document.getElementById('statusText');
  const statusIcons = document.getElementById('statusIcons');
  const tsRow       = document.getElementById('tsRow');
  const logContainer= document.getElementById('logContainer');
  const cardTemp    = document.getElementById('cardTemp');
  const cardSmoke   = document.getElementById('cardSmoke');
  const cardScore   = document.getElementById('cardScore');

  /* ── Helpers ── */
  function now() {
    return new Date().toLocaleTimeString('id-ID', { hour12: false });
  }

  function addLog(msg, type = '') {
    const el = document.createElement('div');
    el.className = 'log-entry ' + type;
    el.innerHTML = `<span class="ts">[${now()}]</span><span>${msg}</span>`;
    logContainer.prepend(el);
    // keep max 40 lines
    while (logContainer.children.length > 40) logContainer.lastChild.remove();
  }

  function flashCard(card) {
    card.classList.remove('updating');
    void card.offsetWidth; // reflow
    card.classList.add('updating');
    setTimeout(() => card.classList.remove('updating'), 700);
  }

  /* ── Status logic ── */
  function applyStatus(raw) {
    const val = raw.trim().toUpperCase();
    statusBanner.className = 'status-banner';
    statusText.textContent = raw.trim().toUpperCase();

    if (val.includes('BAHAYA')) {
      statusBanner.classList.add('bahaya');
      statusIcons.textContent = '🚨 🚨 🚨';
    } else if (val.includes('WASPADA')) {
      statusBanner.classList.add('waspada');
      statusIcons.textContent = '⚠️ ⚠️';
    } else if (val.includes('AMAN')) {
      statusBanner.classList.add('aman');
      statusIcons.textContent = '✅';
    } else {
      statusIcons.textContent = '';
    }
  }

  /* ── MQTT setup ── */
  let client;

  function connect() {
    client = new Paho.MQTT.Client(BROKER, PORT, '/mqtt', CLIENT_ID);

    client.onConnectionLost = function (res) {
      connBadge.className = 'conn-badge error';
      connLabel.textContent = 'DISCONNECTED';
      addLog('Connection lost: ' + res.errorMessage, 'err');
      // retry after 5s
      setTimeout(connect, 5000);
    };

    client.onMessageArrived = function (msg) {
      const topic   = msg.destinationName;
      const payload = msg.payloadString;
      addLog(topic.split('/').pop().toUpperCase() + ' → ' + payload, 'ok');
      tsRow.textContent = 'Last update: ' + now();

      if (topic.endsWith('/temp')) {
        valTemp.textContent = payload;
        flashCard(cardTemp);
      } else if (topic.endsWith('/smoke')) {
        valSmoke.textContent = payload;
        flashCard(cardSmoke);
      } else if (topic.endsWith('/score')) {
        valScore.textContent = payload;
        flashCard(cardScore);
      } else if (topic.endsWith('/status')) {
        applyStatus(payload);
      }
    };

    addLog('Connecting to ' + BROKER + ':' + PORT + ' …');

    client.connect({
      useSSL: true,
      onSuccess: function () {
        connBadge.className = 'conn-badge connected';
        connLabel.textContent = 'CONNECTED · ' + BROKER;
        addLog('Connected! Client ID: ' + CLIENT_ID, 'ok');
        TOPICS.forEach(t => {
          client.subscribe(t, { qos: 0 });
          addLog('Subscribed → ' + t, 'ok');
        });
      },
      onFailure: function (err) {
        connBadge.className = 'conn-badge error';
        connLabel.textContent = 'FAILED — RETRYING';
        addLog('Connection failed: ' + err.errorMessage, 'err');
        setTimeout(connect, 5000);
      },
      keepAliveInterval: 60
    });
  }

  connect();

})();
</script>
</body>
</html>
